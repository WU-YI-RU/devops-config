apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo
  labels:
    app: devops-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-demo
  template:
    metadata:
      labels:
        app: devops-demo
    spec:
      containers:
        - name: devops-demo
          image: ghcr.io/4-learn/devops-demo:4b3a94f3e58d6d393a5539409dfac5acccd3df9b
          imagePullPolicy: Always
          ports:
            - containerPort: 6163
          readinessProbe:
            httpGet:
              path: /health
              port: 6163
            periodSeconds: 5
